title: My Ideas Blog
description: A blog sharing my ideas and projects
author: manojkumar-github
email: your.email@example.com
theme: jekyll-theme-minimal

# URL configuration
baseurl: /ideas
url: https://manojkumar-github.github.io

# Collections for blog posts
collections:
  posts:
    output: true
    permalink: /blog/:year/:month/:day/:title/

# Front matter defaults
defaults:
  - scope:
      path: "_posts"
      type: "posts"
    values:
      layout: "post"
      category: "blog"

# Markdown settings
markdown: kramdown

# Exclude files from build
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
